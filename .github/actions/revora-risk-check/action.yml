name: 'Revora CI/CD Quality Gate'
description: 'Deterministically evaluates deployment risk and blocks unsafe releases'
inputs:
  service_name:
    description: 'Name of the service being deployed'
    required: true
  revora_url:
    description: 'Revora backend URL for historical operational memory'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Run Revora Local Analysis
      shell: bash
      run: |
        npx revora-cli ci --service "${{ inputs.service_name }}" --url "${{ inputs.revora_url }}"
