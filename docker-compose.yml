version: '3.8'

services:
  revora:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://revora:revorapassword@postgres:5432/revora?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: revora
      POSTGRES_PASSWORD: revorapassword
      POSTGRES_DB: revora
    ports:
      - "5432:5432"
    volumes:
      - revora_pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - revora_redisdata:/data
    restart: always

volumes:
  revora_pgdata:
  revora_redisdata:
